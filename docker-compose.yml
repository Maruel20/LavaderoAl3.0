version: '3.8'

services:
  # Base de datos MySQL
  mysql:
    image: mysql:8.0
    container_name: lavadero_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: lavadero_al
      MYSQL_USER: ${DB_USER:-lavadero_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lavadero_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"
    networks:
      - lavadero_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lavadero_backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER:-lavadero_user}
      DB_PASSWORD: ${DB_PASSWORD:-lavadero_password}
      DB_NAME: lavadero_al
      DB_PORT: 3306
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - lavadero_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Vue + Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lavadero_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - lavadero_network

networks:
  lavadero_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
